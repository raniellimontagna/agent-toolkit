name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm run check

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [ "v${package_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            exit 1
          fi

      - name: Publish to npm
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          for attempt in 1 2 3; do
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${package_version} is already published."
              exit 0
            fi

            echo "Publishing ${package_name}@${package_version} (attempt ${attempt}/3)."
            if npm publish --access public; then
              exit 0
            fi

            status="$?"
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${package_version} was published despite a failed response."
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            sleep "$((attempt * 30))"
          done
